<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Bible Reading · 每日读经</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid #ddd;
      padding: 24px 20px 18px;
      text-align: center;
      position: relative;
    }

    .ui-lang-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      border: 1px solid #ccc;
      border-radius: 4px;
      overflow: hidden;
    }

    .ui-lang-btn {
      padding: 4px 12px;
      font-size: 12px;
      cursor: pointer;
      background: #fff;
      color: #666;
      border: none;
    }

    .ui-lang-btn.active { background: #111; color: #fff; }

    header .date-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }

    header h1 {
      font-size: 24px;
      font-weight: 400;
      color: #111;
    }

    header .book-tag {
      display: inline-block;
      margin-top: 8px;
      font-size: 12px;
      color: #666;
    }

    .day-nav {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 14px;
    }

    .day-btn {
      background: #fff;
      border: 1px solid #ccc;
      color: #333;
      font-size: 12px;
      padding: 4px 14px;
      cursor: pointer;
    }

    .day-btn:hover { background: #f5f5f5; }
    .day-btn.current { background: #111; color: #fff; border-color: #111; cursor: default; }
    .day-btn:disabled { opacity: 0.3; cursor: default; }

    .main {
      max-width: 780px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    .no-reading {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }

    .no-reading h2 { font-size: 20px; margin-bottom: 10px; font-weight: 400; }
    .no-reading p  { font-size: 15px; line-height: 1.7; }

    .week-review { margin-top: 32px; text-align: left; max-width: 380px; margin-left: auto; margin-right: auto; }
    .week-review h3 { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; font-weight: 400; }
    .week-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; padding: 11px 14px; border-radius: 6px; cursor: pointer; color: #333; border: 1px solid transparent; transition: background .15s, border-color .15s; }
    .week-row:hover { background: #f5f5f5; border-color: #e0e0e0; }
    .week-row .wr-day { font-size: 11px; color: #999; min-width: 80px; }
    .week-row .wr-title { flex: 1; font-weight: 500; padding: 0 10px; }
    .week-row .wr-arrow { color: #bbb; font-size: 12px; }

    .commentary {
      border: 1px solid #ddd;
      border-left: 3px solid #111;
      padding: 18px 20px;
      margin-bottom: 24px;
    }

    .commentary h2 {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 10px;
    }

    .commentary p { font-size: 15px; line-height: 1.8; color: #333; }

    .key-themes { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 14px; }

    .theme-tag {
      font-size: 11px;
      padding: 3px 10px;
      border: 1px solid #ccc;
      color: #555;
    }

    .lang-tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
    }

    .lang-tab {
      flex: 1;
      padding: 10px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-bottom: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
    }

    .lang-tab.active { background: #fff; color: #111; border-bottom: 1px solid #fff; }

    .bible-panel {
      display: none;
      border: 1px solid #ddd;
      border-top: none;
      padding: 24px 24px 28px;
    }

    .bible-panel.active { display: block; }

    .loading-text { color: #888; font-size: 14px; font-style: italic; }

    .verse { display: flex; gap: 14px; margin-bottom: 12px; line-height: 1.8; }
    .verse-num { min-width: 24px; color: #aaa; font-size: 12px; padding-top: 3px; text-align: right; flex-shrink: 0; }
    .verse-text { font-size: 16px; color: #222; }
    .verse-text.zh {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif;
      font-size: 15.5px;
      line-height: 1.9;
    }

    .section-label {
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin: 28px 0 12px;
    }

    .resources { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    @media (max-width: 600px) {
      .resources { grid-template-columns: 1fr; }
      .ui-lang-toggle { top: 12px; right: 12px; }
    }

    .resource-card {
      border: 1px solid #ddd;
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .resource-card:hover { background: #f9f9f9; }
    .resource-icon { font-size: 20px; flex-shrink: 0; }
    .resource-card h3 { font-size: 13px; font-weight: bold; color: #111; margin-bottom: 3px; }
    .resource-card p  { font-size: 12px; color: #888; line-height: 1.5; }

    [data-lang]      { display: none; }
    span[data-lang]  { display: none; }

    body.ui-en [data-lang="en"]      { display: revert; }
    body.ui-zh [data-lang="zh"]      { display: revert; }
    body.ui-en span[data-lang="en"]  { display: inline; }
    body.ui-zh span[data-lang="zh"]  { display: inline; }

    .zh-font {
      font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', serif;
    }
  </style>
</head>
<body class="ui-zh">

<!-- Reading schedule modal -->
<div id="schedule-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;overflow-y:auto;" onclick="if(event.target===this)closeSchedule()">
  <div style="background:#fff;max-width:520px;margin:40px auto;padding:28px 24px;position:relative;">
    <button onclick="closeSchedule()" style="position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;color:#888;">✕</button>
    <h2 class="zh-font" style="font-size:16px;font-weight:600;margin-bottom:4px;">读经计划</h2>
    <h2 style="font-size:13px;font-weight:400;color:#888;margin-bottom:20px;">Reading Schedule</h2>
    <div id="schedule-list" style="font-size:13px;line-height:1.8;"></div>
  </div>
</div>

<header>
  <div class="ui-lang-toggle">
    <button class="ui-lang-btn"        id="btn-en" onclick="setUILang('en')">EN</button>
    <button class="ui-lang-btn active" id="btn-zh" onclick="setUILang('zh')">中文</button>
  </div>

  <div class="date-label" id="header-date"></div>
  <h1 id="header-title"></h1>
  <span class="book-tag" id="header-tag"></span>

  <div class="day-nav">
    <button class="day-btn" id="btn-prev" onclick="goDay(-1)">
      <span data-lang="en">← Previous</span>
      <span data-lang="zh" class="zh-font">← 上一天</span>
    </button>
    <button class="day-btn" id="btn-today" onclick="goToday()">
      <span data-lang="en">Today</span>
      <span data-lang="zh" class="zh-font">今天</span>
    </button>
    <button class="day-btn" id="btn-next" onclick="goDay(1)">
      <span data-lang="en">Next →</span>
      <span data-lang="zh" class="zh-font">下一天 →</span>
    </button>
    <button class="day-btn" onclick="openSchedule()">
      <span data-lang="en">Schedule</span>
      <span data-lang="zh" class="zh-font">读经计划</span>
    </button>
  </div>
</header>

<div class="main" id="main-content"></div>

<script>
  // ── State ────────────────────────────────────────────────────────────────
  let currentDate  = todayStr();
  let rota         = {};
  let chineseData  = {};
  let xinyiData    = {};
  let nivData      = {};
  let commentary   = {};
  let tyndaleData  = {};
  let activeBible  = 'zh';

  function todayStr() {
    const d = new Date();
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  }

  function formatDate(dateStr, lang) {
    const d = new Date(dateStr + 'T00:00:00');
    if (lang === 'zh') {
      return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 · ${'日一二三四五六'.split('')[d.getDay()]}`;
    }
    return d.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }

  function addDays(dateStr, n) {
    const d = new Date(dateStr + 'T00:00:00');
    d.setDate(d.getDate() + n);
    return [d.getFullYear(), String(d.getMonth()+1).padStart(2,'0'), String(d.getDate()).padStart(2,'0')].join('-');
  }

  // Get Mon–Fri dates of the week containing dateStr
  function thisWeekRotaDates(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    const dow = d.getDay(); // 0=Sun, 6=Sat
    const monday = new Date(d);
    monday.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1));
    const results = [];
    for (let i = 0; i < 5; i++) {
      const day = new Date(monday);
      day.setDate(monday.getDate() + i);
      const str = [day.getFullYear(), String(day.getMonth()+1).padStart(2,'0'), String(day.getDate()).padStart(2,'0')].join('-');
      if (rota[str]) results.push(str);
    }
    return results;
  }

  // Find nearest rota entry (skip weekends by looking for dates in rota)
  function nearestRotaDate(dateStr) {
    if (rota[dateStr]) return dateStr;
    // look back up to 7 days
    let d = dateStr;
    for (let i = 0; i < 7; i++) {
      d = addDays(d, -1);
      if (rota[d]) return d;
    }
    return null;
  }

  // ── Load data ────────────────────────────────────────────────────────────
  async function loadData() {
    const [rotaRes, zhRes, xinyiRes, commRes, nivRes, tynRes] = await Promise.all([
      fetch('data/rota.json'),
      fetch('data/chinese_bible.json'),
      fetch('data/xinyi_bible.json'),
      fetch('data/commentary.json'),
      fetch('data/niv.json'),
      fetch('data/tyndale_pages.json'),
    ]);
    rota        = await rotaRes.json();
    chineseData = await zhRes.json();
    xinyiData   = await xinyiRes.json();
    commentary  = await commRes.json();
    nivData     = await nivRes.json();
    tyndaleData = await tynRes.json();
  }

  // ── Render ───────────────────────────────────────────────────────────────
  async function render() {
    const main = document.getElementById('main-content');

    // header date
    document.getElementById('header-date').innerHTML =
      `<span data-lang="en">${formatDate(currentDate, 'en')}</span>` +
      `<span data-lang="zh" class="zh-font">${formatDate(currentDate, 'zh')}</span>`;

    const entry = rota[currentDate];

    // nav button states
    const dates   = Object.keys(rota).sort();
    const idx     = dates.indexOf(currentDate);
    const prevDay = addDays(currentDate, -1);
    const nextDay = addDays(currentDate, +1);
    const firstRotaDate = dates[0];
    const lastRotaDate  = dates[dates.length - 1];
    document.getElementById('btn-prev').disabled = currentDate <= firstRotaDate;
    document.getElementById('btn-next').disabled = currentDate >= lastRotaDate;
    const onToday = currentDate === todayStr();
    document.getElementById('btn-today').classList.toggle('current', onToday);

    if (!entry) {
      // Weekend / no reading day
      const dow = new Date(currentDate + 'T00:00:00').getDay();
      const dayLabelEn = (dow === 0 || dow === 6) ? 'Rest Day' : 'No Reading Scheduled';
      const dayLabelZh = (dow === 0 || dow === 6) ? '休息日' : '今日无安排';
      document.getElementById('header-title').innerHTML =
        `<span data-lang="en">${dayLabelEn}</span>` +
        `<span data-lang="zh" class="zh-font">${dayLabelZh}</span>`;
      document.getElementById('header-tag').innerHTML = '';

      const weekDates = thisWeekRotaDates(currentDate);
      const weekRowsEn = weekDates.map(d => {
        const e = rota[d];
        const dayObj = new Date(d + 'T00:00:00');
        const dayLabel = dayObj.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        return `<div class="week-row" onclick="currentDate='${d}';render()" data-lang="en">
          <span class="wr-day">${dayLabel}</span>
          <span class="wr-title">${e.book} ${e.chapter}</span>
          <span class="wr-arrow">→</span>
        </div>`;
      }).join('');
      const weekRowsZh = weekDates.map(d => {
        const e = rota[d];
        const dayObj = new Date(d + 'T00:00:00');
        const dayLabel = `周${'日一二三四五六'.split('')[dayObj.getDay()]} ${dayObj.getMonth()+1}/${dayObj.getDate()}`;
        return `<div class="week-row zh-font" onclick="currentDate='${d}';render()" data-lang="zh">
          <span class="wr-day">${dayLabel}</span>
          <span class="wr-title">${e.bookZh} 第${chapterNumZh(e.chapter)}章</span>
          <span class="wr-arrow">→</span>
        </div>`;
      }).join('');

      main.innerHTML = `
        <div class="no-reading">
          <h2 data-lang="en">${dayLabelEn}</h2>
          <h2 data-lang="zh" class="zh-font">${dayLabelZh}</h2>
          <p data-lang="en">Use the arrows above to navigate, or revisit this week's readings below.</p>
          <p data-lang="zh" class="zh-font">可用上方箭头导航，或点击下方回顾本周读经。</p>
          ${weekDates.length > 0 ? `
          <div class="week-review">
            <h3 data-lang="en">This Week</h3>
            <h3 data-lang="zh" class="zh-font">本周读经</h3>
            ${weekRowsEn}
            ${weekRowsZh}
          </div>` : ''}
        </div>`;
      applyUILang();
      return;
    }

    // Header
    document.getElementById('header-title').innerHTML =
      `<span data-lang="en">${entry.book} · Chapter ${entry.chapter}</span>` +
      `<span data-lang="zh" class="zh-font">${entry.bookZh} · 第${chapterNumZh(entry.chapter)}章</span>`;
    document.getElementById('header-tag').innerHTML =
      `<span data-lang="en">New Testament · ${entry.book}</span>` +
      `<span data-lang="zh" class="zh-font">新约 · ${entry.bookZh}</span>`;

    // Commentary
    const comm = commentary[entry.ref] || {};
    const themesEn = (comm.themes_en || []).map(t => `<span class="theme-tag">${t}</span>`).join('');
    const themesZh = (comm.themes_zh || []).map(t => `<span class="theme-tag zh-font">${t}</span>`).join('');

    const bookKey     = entry.ref.split('.')[0];
    const chStr       = String(entry.chapter);
    const tyndaleURL  = getTyndaleURL(bookKey, entry.chapter);
    const chosenClip  = (CHOSEN_CLIPS[bookKey] || {})[entry.chapter] || null;

    function renderVerses(source, cls='') {
      return ((source[bookKey] || {})[chStr] || [])
        .map(v => `<div class="verse"><span class="verse-num">${v.v}</span><span class="verse-text${cls ? ' '+cls : ''}">${v.t}</span></div>`)
        .join('') || '<p style="color:#aaa">Text not available.</p>';
    }

    const zhVerses    = renderVerses(chineseData, 'zh');
    const xinyiVerses = renderVerses(xinyiData,   'zh');
    const nivVerses   = renderVerses(nivData);

    main.innerHTML = `
      <div class="commentary">
        <h2>
          <span data-lang="en">About This Chapter</span>
          <span data-lang="zh" class="zh-font">本章简介</span>
        </h2>
        <p data-lang="en">${comm.en || ''}</p>
        <p data-lang="zh" class="zh-font">${comm.zh || ''}</p>
        <div class="key-themes">
          <div data-lang="en">${themesEn}</div>
          <div data-lang="zh">${themesZh}</div>
        </div>
      </div>

      <div class="lang-tabs">
        <button class="lang-tab ${activeBible==='zh'?'active':''}"    id="tab-zh"    onclick="switchBible('zh')">
          <span data-lang="en">和合本</span>
          <span data-lang="zh" class="zh-font">和合本</span>
        </button>
        <button class="lang-tab ${activeBible==='xinyi'?'active':''}" id="tab-xinyi" onclick="switchBible('xinyi')">
          <span data-lang="en">新译本</span>
          <span data-lang="zh" class="zh-font">新译本</span>
        </button>
        <button class="lang-tab ${activeBible==='niv'?'active':''}"   id="tab-niv"   onclick="switchBible('niv')">NIV</button>
      </div>

      <div class="bible-panel ${activeBible==='zh'?'active':''}"    id="panel-zh">${zhVerses}</div>
      <div class="bible-panel ${activeBible==='xinyi'?'active':''}" id="panel-xinyi">${xinyiVerses}</div>
      <div class="bible-panel ${activeBible==='niv'?'active':''}"   id="panel-niv">${nivVerses}</div>

      <div class="section-label">
        <span data-lang="en">Resources</span>
        <span data-lang="zh" class="zh-font">延伸资源</span>
      </div>

      <div class="resources">
        ${tyndaleURL ? `
        <a class="resource-card" href="${tyndaleURL}" target="_blank">
          <span class="resource-icon">📚</span>
          <div>
            <h3 data-lang="en">Tyndale Commentary — ${entry.book} ${entry.chapter}</h3>
            <h3 data-lang="zh" class="zh-font">丁道尔注释 — ${entry.bookZh}第${chapterNumZh(entry.chapter)}章</h3>
            <p data-lang="en">Opens in browser — jumps straight to this chapter.</p>
            <p data-lang="zh" class="zh-font">在浏览器中打开，直接跳转至本章页码。</p>
          </div>
        </a>` : ''}
        <a class="resource-card" href="https://www.youtube.com/watch?v=${entry.youtubeId}" target="_blank">
          <span class="resource-icon">▶</span>
          <div>
            <h3 data-lang="en">The Bible Project — ${entry.book}</h3>
            <h3 data-lang="zh" class="zh-font">圣经项目 — ${entry.bookZh}</h3>
            <p data-lang="en">Visual overview of the book. Great context for today's chapter.</p>
            <p data-lang="zh" class="zh-font">全书动画概览，帮助理解今日章节背景。</p>
          </div>
        </a>
        ${chosenClip ? `
        <a class="resource-card" href="${chosenClip.url}" target="_blank">
          <span class="resource-icon">🎬</span>
          <div>
            <h3 data-lang="en">The Chosen — ${chosenClip.title_en}</h3>
            <h3 data-lang="zh" class="zh-font">《蒙选》— ${chosenClip.title_zh}</h3>
            <p data-lang="en">${chosenClip.verses} · Live-action scene from The Chosen.</p>
            <p data-lang="zh" class="zh-font">${chosenClip.verses} · 《蒙选》真人影视片段。</p>
          </div>
        </a>` : ''}
        <a class="resource-card" href="https://www.gotquestions.org/search-results.html?q=${entry.book.toLowerCase()}+${entry.chapter}#gsc.tab=0&gsc.q=${encodeURIComponent(entry.book.toLowerCase()+' '+entry.chapter)}&gsc.page=1" target="_blank">
          <span class="resource-icon">💬</span>
          <div>
            <h3 data-lang="en">GotQuestions — ${entry.book} ${entry.chapter}</h3>
            <h3 data-lang="zh" class="zh-font">经文问答 — ${entry.bookZh}第${chapterNumZh(entry.chapter)}章</h3>
            <p data-lang="en">Questions and answers about today's chapter.</p>
            <p data-lang="zh" class="zh-font">关于今日章节的问答注释。</p>
          </div>
        </a>
      </div>`;

    applyUILang();
  }

  // ── The Chosen clips keyed by book ref + chapter ────────────────────────
  const CHOSEN_CLIPS = {
    JHN: {
      1:  { url: 'https://youtu.be/Vt25awoelhk',                    verses: 'John 1:1–5',    title_en: 'In the Beginning',      title_zh: '太初有道' },
      2:  { url: 'https://youtu.be/H3R0Mkx8rrc',                    verses: 'John 2:1–11',   title_en: 'Wedding at Cana',       title_zh: '迦拿婚宴' },
      3:  { url: 'https://youtu.be/EDglwQvwQ6c',                    verses: 'John 3:1–16',   title_en: 'Jesus & Nicodemus',     title_zh: '耶稣与尼哥底母' },
      4:  { url: 'https://youtu.be/5MMgEJ37sbg',                    verses: 'John 4:7–29',   title_en: 'Woman at the Well',     title_zh: '撒玛利亚妇人' },
      5:  { url: 'https://youtu.be/5FlO1U95Vws',                    verses: 'John 5:1–13',   title_en: 'Healing at Bethesda',   title_zh: '毕士大池边的医治' },
      9:  { url: 'https://www.youtube.com/watch?v=_2d3eh1yuas',     verses: 'John 9:1–34',   title_en: 'Man Born Blind',        title_zh: '生来瞎眼的人' },
      10: { url: 'https://www.youtube.com/watch?v=Con6X70XTww',     verses: 'John 10:1–39',  title_en: 'The Good Shepherd',     title_zh: '好牧人' },
      11: { url: 'https://www.youtube.com/watch?v=ITkCumgHm7c',     verses: 'John 11:1–45',  title_en: 'Lazarus Raised',        title_zh: '拉撒路复活' },
      12: { url: 'https://www.youtube.com/watch?v=jVKDe2NgzWI',     verses: 'John 12:23–36', title_en: 'When I Am Lifted Up',   title_zh: '我若被举起来' },
      13: { url: 'https://www.youtube.com/watch?v=v3YJc5FeDYQ',     verses: 'John 13:4–17',  title_en: 'Jesus Washes Feet',     title_zh: '耶稣为门徒洗脚' },
      14: { url: 'https://www.youtube.com/watch?v=EXWdLc2_umU',     verses: 'John 13:33–14:29', title_en: 'Jesus Gives Peace',  title_zh: '赐平安' },
      15: { url: 'https://www.youtube.com/watch?v=EeP7w9NXUSQ',     verses: 'John 15:1–11',  title_en: 'The True Vine',         title_zh: '真葡萄树' },
      16: { url: 'https://www.youtube.com/watch?v=HVa0tJPe5LE',     verses: 'John 16:16–33', title_en: 'Christ Has Overcome',   title_zh: '我已胜了世界' },
    }
  };

  // ── Helpers ──────────────────────────────────────────────────────────────
  function chapterNumZh(n) {
    const zh = ['一','二','三','四','五','六','七','八','九','十',
                 '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十'];
    return zh[n-1] || n;
  }

  function gqBookSlug(book) {
    const overrides = {
      'John':    'Gospel-of-John',
      'Mark':    'Gospel-of-Mark',
      'Luke':    'Gospel-of-Luke',
      'Matthew': 'Gospel-of-Matthew',
    };
    return overrides[book] || 'Book-of-' + book.replace(/ /g, '-');
  }

  function getTyndaleURL(bookKey, chapter) {
    const entry = tyndaleData[bookKey];
    if (!entry) return null;
    const pg = (entry.pages || {})[String(chapter)];
    if (!pg) return null;
    return `pdfviewer.html?file=${encodeURIComponent(entry.pdf)}&page=${pg}`;
  }

  function refToBlueLetterPath(ref) {
    const map = { 'HEB': 'heb', '2JN': '2jo', 'JHN': 'jhn' };
    const [book, ch] = ref.split('.');
    return `${map[book]||book.toLowerCase()}/${ch}/1/`;
  }

  function openSchedule() {
    const list = document.getElementById('schedule-list');
    const isZh = document.body.classList.contains('ui-zh');
    const dates = Object.keys(rota).sort();
    const rows = dates.map(date => {
      const e = rota[date];
      const d = new Date(date + 'T00:00:00');
      const dateStr = isZh
        ? `${d.getMonth()+1}月${d.getDate()}日`
        : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
      const ref = isZh
        ? `<span class="zh-font">${e.bookZh} 第${e.chapter}章</span>`
        : `${e.book} ${e.chapter}`;
      const isToday = date === todayStr();
      const todayStyle = isToday ? 'font-weight:600;background:#f5f5f5;' : '';
      return `<div onclick="currentDate='${date}';closeSchedule();render()" style="cursor:pointer;padding:4px 6px;border-radius:4px;${todayStyle}" onmouseover="this.style.background='#f0f0f0'" onmouseout="this.style.background='${isToday ? '#f5f5f5' : ''}'"><span style="color:#aaa;min-width:60px;display:inline-block;">${dateStr}</span> ${ref}</div>`;
    });
    list.innerHTML = rows.join('');
    document.getElementById('schedule-modal').style.display = 'block';
  }

  function closeSchedule() {
    document.getElementById('schedule-modal').style.display = 'none';
  }

  function setUILang(lang) {
    document.body.classList.remove('ui-en', 'ui-zh');
    document.body.classList.add('ui-' + lang);
    document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    document.getElementById('btn-zh').classList.toggle('active', lang === 'zh');
    switchBible(lang === 'zh' ? 'zh' : 'niv');
  }

  function applyUILang() {
    const lang = document.body.classList.contains('ui-zh') ? 'zh' : 'en';
    setUILang(lang);
  }

  function switchBible(key) {
    activeBible = key;
    document.querySelectorAll('.lang-tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.bible-panel').forEach(p => p.classList.remove('active'));
    const tab   = document.getElementById('tab-' + key);
    const panel = document.getElementById('panel-' + key);
    if (tab)   tab.classList.add('active');
    if (panel) panel.classList.add('active');
  }

  function goToday() {
    currentDate = todayStr();
    render();
  }

  function goDay(delta) {
    currentDate = addDays(currentDate, delta);
    render();
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  (async () => {
    await loadData();
    render();
  })();

</script>

</body>
</html>
